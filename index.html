<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Oportunidades - PR Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Header -->
    <header class="bg-slate-900 text-white py-6 px-8 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-amber-400">⚡ Í.C.A.R.O. Radar</h1>
                <p class="text-sm text-gray-400">Oportunidades de PR e Comunicação Corporativa em Tempo Real</p>
            </div>
            
            <!-- FILTROS -->
            <div class="flex flex-wrap gap-3 bg-slate-800 p-3 rounded-lg w-full md:w-auto">
                <select id="filtroAgencia" class="bg-slate-700 text-white text-sm p-2 rounded border border-slate-600 focus:outline-none focus:border-amber-400">
                    <option value="">Todas as Agências</option>
                    <option value="In Press Porter Novelli">In Press Porter Novelli</option>
                    <option value="FleishmanHillard">FleishmanHillard</option>
                </select>
                
                <input id="filtroCliente" type="text" placeholder="Buscar por cliente..." class="bg-slate-700 text-white text-sm p-2 rounded border border-slate-600 focus:outline-none focus:border-amber-400 placeholder-gray-400">
            </div>
        </div>
    </header>

    <!-- Container Principal -->
    <main class="max-w-4xl mx-auto px-4 py-10">
        <!-- Linha da Timeline -->
        <div class="relative border-l-2 border-slate-300 ml-4 md:ml-32" id="timelineContainer">
            <p class="text-gray-500 pl-6 py-4">Carregando oportunidades em tempo real...</p>
        </div>
    </main>

    <script>
        let dadosOportunidades = [];

        function renderizarTimeline(dados) {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';

            if (dados.length === 0) {
                container.innerHTML = `<p class="text-gray-500 pl-6 py-4">Nenhuma oportunidade encontrada com os filtros selecionados.</p>`;
                return;
            }

            dados.forEach(item => {
                const descricaoCurta = item.descricao.substring(0, 300);
                
                // Tags dos SERVIÇOS de PR a serem oferecidos
                const tagsProdutos = item.produtos.map(p => `
                    <span class="bg-amber-100 text-amber-800 text-xs font-semibold px-2.5 py-0.5 rounded">${p}</span>
                `).join(' ');
                
                // Trata a URL da notícia (fallback para Google Notícias caso a IA não retorne link válido)
                const linkValidado = item.link_noticia || `https://www.google.com/search?q=noticias+${encodeURIComponent(item.marcas.join('+'))}`;

                const card = `
                    <div class="mb-10 relative pl-6 md:pl-8 group">
                        <!-- Marcador Visual da Timeline -->
                        <div class="absolute -left-[9px] top-1.5 bg-slate-900 rounded-full h-4 w-4 border-2 border-white group-hover:bg-amber-500 transition-colors"></div>
                        
                        <!-- Data Flutuante Lateral -->
                        <div class="hidden md:block absolute -left-32 top-0.5 w-24 text-right text-sm font-bold text-slate-500">${item.data}</div>
                        
                        <!-- Ficha Cadastral -->
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow flex flex-col md:flex-row">
                            
                            <div class="md:w-1/3 h-48 md:h-auto relative bg-gray-100 flex-shrink-0">
                                <img src="${item.imagem}" alt="Contexto" class="w-full h-full object-cover">
                                <span class="absolute top-2 left-2 bg-slate-900/80 text-white text-[10px] font-bold px-2 py-0.5 rounded tracking-wide uppercase">
                                    ${item.agencia === 'In Press Porter Novelli' ? 'In Press' : 'FH'}
                                </span>
                            </div>
                            
                            <div class="p-5 flex flex-col justify-between flex-grow">
                                <div>
                                    <div class="flex justify-between items-start gap-2 mb-1">
                                        <span class="text-xs font-bold uppercase tracking-wider text-slate-400">${item.setor}</span>
                                        <span class="md:hidden text-xs font-bold text-slate-500">${item.data}</span>
                                    </div>
                                    <h3 class="text-lg font-bold text-slate-900 mb-2">
                                        🎯 Marcas: ${item.marcas.join(', ')}
                                    </h3>
                                    <p class="text-sm text-gray-600 mb-4 leading-relaxed">${descricaoCurta}</p>
                                </div>
                                
                                <div class="border-t border-gray-100 pt-3 mt-2 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                                    <div>
                                        <span class="text-[10px] font-bold text-gray-400 block mb-1 uppercase tracking-wide">Serviços de PR sugeridos:</span>
                                        <div class="flex flex-wrap gap-1.5">${tagsProdutos}</div>
                                    </div>
                                    
                                    <a href="${linkValidado}" target="_blank" class="flex-shrink-0 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold py-1.5 px-3 rounded inline-flex items-center transition-colors shadow-sm">
                                        Ler Notícia ↗
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function filtrarGeral() {
            const agencia = document.getElementById('filtroAgencia').value;
            const cliente = document.getElementById('filtroCliente').value.toLowerCase();

            const dadosFiltrados = dadosOportunidades.filter(item => {
                const bateAgencia = agencia === "" || item.agencia === agencia;
                const bateCliente = cliente === "" || item.marcas.some(m => m.toLowerCase().includes(cliente));
                return bateAgencia && bateCliente;
            });

            renderizarTimeline(dadosFiltrados);
        }

        document.getElementById('filtroAgencia').addEventListener('change', filtrarGeral);
        document.getElementById('filtroCliente').addEventListener('input', filtrarGeral);

        fetch('oportunidades.json')
            .then(response => {
                if (!response.ok) throw new Error('Arquivo JSON inacessível.');
                return response.json();
            })
            .then(dados => {
                dadosOportunidades = dados;
                renderizarTimeline(dadosOportunidades);
            })
            .catch(err => {
                console.error("Erro:", err);
            });
    </script>
</body>
</html>
