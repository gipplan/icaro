name: Atualização Automática do Radar Í.C.A.R.O.

on:
  schedule:
    # Executa automaticamente todos os dias às 07:00 AM BRT (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch: # Permite que você clique em um botão e force a atualização manual

# Garante que o robô tem permissão para salvar o arquivo JSON no seu repositório
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Copia os arquivos do repositório para a máquina virtual (Atualizado para v4)
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Instala o ambiente Python (Corrigido para python-version e atualizado para v5)
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala as dependências necessárias para IA e Busca Segura
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai duckduckgo_search

    # 4. Executa o script que chama o Gemini e as imagens
    - name: Executar Motor de Inteligência
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python gerar_oportunidades.py

    # 5. Salva o arquivo oportunidades.json gerado de volta no seu repositório público
    - name: Commitar e enviar alterações
      run: |
        git config --global user.name "Í.C.A.R.O. Bot"
        git config --global user.email "bot@icaro.ai"
        git add oportunidades.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Radar Atualizado: $(date +'%d/%m/%Y %H:%M:%S')" && git push)
