name: Executar Motor de Inteligência

# Define quando o robô vai rodar
on:
  workflow_dispatch: # Permite rodar manualmente
    inputs:
      marca_alvo:
        description: 'Marca para busca prioritária'
        required: false
        default: ''
  schedule:
    - cron: '0 9 * * 1-5' # Roda de segunda a sexta às 9h UTC (6h da manhã no BR)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install google-genai duckduckgo-search

      - name: Executar o motor Í.C.A.R.O.
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MARCA_ALVO: ${{ github.event.inputs.marca_alvo }} # Transmite a marca do site para o Python
        run: python gerar_oportunidades.py

      - name: Commitar e enviar alterações
        run: |
          git config --global user.name "Í.C.A.R.O. Bot"
          git config --global user.email "bot@icaro.com"
          git add oportunidades.json
          git commit -m "🤖 Radar Atualizado com novas oportunidades" || echo "Nenhuma mudança para commitar"
          git pull --rebase origin main
          git push
