name: Atualização Automática do Radar Í.C.A.R.O.

on:
  schedule:
    # Executa automaticamente todos os dias às 07:00 AM BRT (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch: # Permite que você clique em um botão e force a atualização manual

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Copia os arquivos do repositório para a máquina virtual
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Instala o ambiente Python 3.11 (Evita avisos de depreciação)
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Instala as dependências modernas (Trocado para google-genai)
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install google-genai duckduckgo_search

    # 4. Executa o script que chama o Gemini e as imagens
    - name: Executar Motor de Inteligência
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python gerar_oportunidades.py

    # 5. Salva o arquivo oportunidades.json gerado de volta no seu repositório público
  - name: Commitar e enviar alterações
        run: |
          git config --global user.name "Í.C.A.R.O. Bot"
          git config --global user.email "bot@icaro.com"
          git add oportunidades.json
          git commit -m "🤖 Radar Atualizado" || echo "Nenhuma mudança para commitar"
          git pull --rebase origin main  # <-- ESSA É A LINHA MÁGICA QUE RESOLVE O CONFLITO
          git push
